services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: finneo-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/finneo_db?schema=public
      - JWT_SECRET=change-this-secret-in-production
      - PORT=5000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: finneo-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000/api

  postgres:
    image: postgres:16-alpine
    container_name: finneo-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=finneo_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
